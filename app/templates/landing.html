<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to [Your Startup]</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 0;
            background: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        header {
            text-align: center;
        }

            border-radius: 5px;
            font-weight: bold;
        }
        .cta a:hover {
            background: #005fa3;
        }

<body>
    <header>
        <h1>Welcome to [Your Startup]</h1>

        <div class="cta">
